<div class="auth-container hidden" id="authContainer">
    <div class="auth-card glass">
        <div class="auth-header">
            <h2 id="authTitle">Secure Access</h2>
            <p id="authSubtitle">Join the MWAMINI community</p>
        </div>
        
        <form id="authForm">
            <div class="input-group" id="usernameGroup" style="display: none;">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="authUsername" placeholder="Full Name">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="authEmail" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="authPassword" placeholder="Password" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block" id="submitAuthBtn">Sign In</button>
        </form>

        <div class="divider"><span>OR</span></div>

        <div class="social-auth">
            <button class="btn btn-google" id="googleAuthBtn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google"> Google
            </button>
            <button class="btn btn-guest" id="guestLoginBtn">
                <i class="fa-solid fa-user-secret"></i> Guest Mode
            </button>
        </div>

        <p class="auth-switch">
            <span id="switchText">Don't have an account?</span> 
            <a href="#" id="switchAuthMode" class="auth-link">Sign Up</a>
        </p>
        
        <div class="security-badge">
            <i class="fa-solid fa-shield-halved"></i> End-to-end encryption active
        </div>
    </div>
</div>
