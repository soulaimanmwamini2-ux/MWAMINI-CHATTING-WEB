<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHATING WEB</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="animated-bg"></div>
    
    <nav class="navbar glass">
        <div class="nav-logo">
            <i class="fa-solid fa-shield-halved logo-icon"></i>
            <span>MWAMINI</span>
        </div>
        <div class="nav-links">
            <button class="btn btn-glass" id="navLoginBtn">Login</button>
        </div>
    </nav>

    <section class="hero-section" id="heroSection">
        <div class="hero-content">
            <h1 class="glow-text">MWAMINI CHATING WEB</h1>
            <p>Secure, real-time messaging with high-fidelity calling.</p>
            <div class="hero-buttons">
                <button class="btn btn-primary" id="getStartedBtn">Get Started <i class="fa-solid fa-bolt"></i></button>
                <button class="btn btn-glass" id="guestModeBtn">Try Guest Mode</button>
            </div>
        </div>
    </section>

    <div class="auth-overlay hidden" id="authOverlay">
        <div class="auth-card glass">
            <div class="auth-header">
                <h2 id="authTitle">Secure Login</h2>
                <p id="authSubtitle">Please enter your credentials</p>
            </div>
            
            <form id="authForm">
                <div class="input-group" id="usernameGroup" style="display: none;">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="authUsername" placeholder="Create Username">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="authEmail" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="authPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="submitAuthBtn">Sign In</button>
            </form>

            <div class="divider"><span>OR</span></div>

            <button class="btn btn-google btn-block" id="googleAuthBtn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Continue with Google
            </button>

            <p class="auth-switch">
                <span id="switchText">Don't have an account?</span> 
                <a href="#" id="switchAuthMode">Register Now</a>
            </p>
        </div>
    </div>

    <script type="module" src="App.js"></script>
    <script type="module" src="Auth.js"></script>
</body>
</html>
