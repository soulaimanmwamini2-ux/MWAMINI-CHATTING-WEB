<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mwamini Chating Web - Connect Securely</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="animated-bg"></div>
    
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-logo">
            <i class="fa-solid fa-comments-blur logo-icon"></i>
            <span>MWAMINI</span>
        </div>
        <div class="nav-links">
            <a href="#features">Features</a>
            <a href="#" id="supportBtn">Support</a>
            <button class="btn btn-outline" id="navLoginBtn">Login</button>
        </div>
    </nav>

    <!-- Hero / Welcome Section -->
    <section class="hero-section" id="heroSection">
        <div class="hero-content">
            <h1 class="glow-text">MWAMINI CHATING WEB</h1>
            <p>Experience ultra-fast, secure, and crystal-clear real-time communication. Inspired by the best, built for the future.</p>
            <div class="hero-buttons">
                <button class="btn btn-primary" id="getStartedBtn">Get Started <i class="fa-solid fa-arrow-right"></i></button>
                <button class="btn btn-glass" id="learnMoreBtn">Explore Features</button>
            </div>
        </div>
    </section>

    <!-- Authentication Modal Container -->
    <div class="auth-container hidden" id="authContainer">
        <div class="auth-card glass">
            <div class="auth-header">
                <h2 id="authTitle">Welcome Back</h2>
                <p id="authSubtitle">Login to access your dashboard</p>
            </div>
            
            <form id="authForm">
                <div class="input-group" id="usernameGroup" style="display: none;">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="authUsername" placeholder="Full Name">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="authEmail" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="authPassword" placeholder="Password" required>
                </div>
                
                <div class="auth-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe" checked> Remember me
                    </label>
                    <a href="#" id="forgotPasswordBtn" class="auth-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="submitAuthBtn">Sign In</button>
            </form>

            <div class="divider"><span>OR</span></div>

            <button class="btn btn-google btn-block" id="googleAuthBtn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google"> Continue with Google
            </button>

            <p class="auth-switch">
                <span id="switchText">Don't have an account?</span> 
                <a href="#" id="switchAuthMode" class="auth-link font-bold">Sign Up</a>
            </p>
        </div>
    </div>

    <!-- Firebase App App/Auth Logic Configuration Script Connections -->
    <script type="module" src="App.js"></script>
    <script type="module" src="Auth.js"></script>
</body>
</html>
