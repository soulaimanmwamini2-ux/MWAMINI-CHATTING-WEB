<div class="flex h-full w-full bg-[#f0f2f5] dark:bg-[#111b21]">
    <aside class="w-1/3 border-r border-gray-300 flex flex-col bg-white dark:bg-[#111b21]">
        <div class="h-16 bg-[#f0f2f5] flex items-center justify-between px-4">
            <ion-icon name="person-circle" class="text-3xl"></ion-icon>
            <div class="flex gap-4">
                <ion-icon onclick="toggleStatusModal()" name="disc-outline" title="Status" class="cursor-pointer"></ion-icon>
                <ion-icon onclick="showGroupCreate()" name="add-circle-outline" title="New Group" class="cursor-pointer"></ion-icon>
                <ion-icon onclick="showSettings()" name="settings-outline" class="cursor-pointer"></ion-icon>
            </div>
        </div>
        <div id="chat-list" class="flex-1 overflow-y-auto">
            </div>
    </aside>

    <main id="chat-main" class="flex-1 flex flex-col relative" style="background-color: #efeae2;">
        <div class="absolute inset-0 opacity-10 pointer-events-none bg-[url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')]"></div>
        
        <header class="h-16 bg-[#f0f2f5] z-10 flex items-center px-4 justify-between">
            <span id="active-title" class="font-bold">Select a Chat</span>
            <button id="del-group-btn" class="hidden text-red-500 text-sm" onclick="handleGroupDelete()">Delete Group</button>
        </header>

        <div id="messages" class="flex-1 p-4 overflow-y-auto z-10"></div>

        <footer class="p-3 bg-[#f0f2f5] z-10 flex gap-2">
            <input id="m-input" class="flex-1 p-2 rounded-lg outline-none" placeholder="Type a message">
            <button onclick="handleSend()" class="text-[#00a884] text-2xl"><ion-icon name="send"></ion-icon></button>
        </footer>
    </main>

    <div id="settings-overlay" class="hidden absolute inset-0 bg-black/50 z-[100] flex items-center justify-center">
        <div class="bg-white p-6 rounded-lg w-80">
            <h3 class="font-bold mb-4">Settings</h3>
            <label class="text-sm">Chat Background</label>
            <input type="color" onchange="changeBg(this.value)" class="w-full mb-4">
            
            <label class="text-sm">Who can see I'm online?</label>
            <select onchange="updatePrivacySetting(this.value)" class="w-full p-2 border mb-6">
                <option value="everyone">Everyone</option>
                <option value="nobody">Nobody</option>
            </select>
            <button onclick="closeSettings()" class="w-full bg-[#00a884] text-white p-2 rounded">Save & Close</button>
        </div>
    </div>
</div>
