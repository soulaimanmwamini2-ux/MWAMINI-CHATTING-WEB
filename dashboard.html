<div class="chat-header-actions">
    <button class="call-btn" title="Voice Call"><i class="fa-solid fa-phone"></i></button>
    <button class="call-btn" title="Video Call"><i class="fa-solid fa-video"></i></button>
</div>

<footer class="chat-footer">
    <label class="footer-action-btn" for="file-input">
        <i class="fa-solid fa-paperclip"></i>
        <input type="file" id="file-input" hidden>
    </label>
    <input type="text" id="messageInputField" placeholder="Type a message...">
    <button class="send-btn" id="sendMessageBtn"><i class="fa-solid fa-paper-plane"></i></button>
</footer>
