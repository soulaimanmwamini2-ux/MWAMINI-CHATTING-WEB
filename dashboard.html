<div class="flex h-screen bg-[#f0f2f5] dark:bg-[#111b21]">
    <aside class="w-1/3 border-r dark:border-[#222d34] flex flex-col bg-white dark:bg-[#111b21]">
        <header class="p-4 bg-[#f0f2f5] dark:bg-[#202c33] flex justify-between">
            <h1 class="text-[#00a884] font-bold">Mwamini Chats</h1>
            <div class="flex gap-4">
                <button onclick="toggleGroupModal()">New Group</button>
                <button onclick="toggleSettings()">Settings</button>
            </div>
        </header>
        
        <div class="p-4 border-b dark:border-[#222d34] flex gap-4 overflow-x-auto">
            <div class="w-12 h-12 rounded-full border-2 border-[#00a884] flex-shrink-0 cursor-pointer" onclick="addStatus()">+</div>
            <div id="status-container" class="flex gap-2"></div>
        </div>

        <div id="chat-list" class="flex-1 overflow-y-auto"></div>
    </aside>

    <main id="chat-main" class="flex-1 flex flex-col bg-cover bg-center" style="background-image: url('default-bg.jpg');">
        <header class="p-4 bg-[#f0f2f5] dark:bg-[#202c33] z-10 flex justify-between">
            <div id="active-chat-info"></div>
            <button id="delete-group-btn" class="hidden text-red-500" onclick="handleGroupDelete()">Delete Group</button>
        </header>

        <div id="messages" class="flex-1 overflow-y-auto p-4 z-10"></div>

        <footer class="p-4 bg-[#f0f2f5] dark:bg-[#202c33] z-10 flex gap-4">
            <input id="msg-input" class="flex-1 p-2 rounded-lg dark:bg-[#2a3942]" placeholder="Type a message">
            <button onclick="sendMessage()" class="text-[#00a884]">Send</button>
        </footer>
    </main>

    <div id="bg-panel" class="hidden fixed right-0 w-64 h-full bg-white dark:bg-[#202c33] shadow-lg p-4 z-20">
        <h3 class="mb-4">Choose Background</h3>
        <div class="grid grid-cols-2 gap-2">
            <div class="h-20 bg-blue-200 cursor-pointer" onclick="setBG('blue.jpg')"></div>
            <div class="h-20 bg-green-200 cursor-pointer" onclick="setBG('green.jpg')"></div>
            <div class="h-20 bg-gray-800 cursor-pointer" onclick="setBG('dark.jpg')"></div>
        </div>
    </div>
</div>
