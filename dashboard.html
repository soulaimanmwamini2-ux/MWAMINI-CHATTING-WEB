<div class="flex h-full w-full">
    <aside class="w-[30%] min-w-[340px] border-r border-[#d1d7db] dark:border-[#222d34] flex flex-col bg-white dark:bg-[#111b21]">
        <header class="h-[60px] px-4 flex items-center justify-between bg-[#f0f2f5] dark:bg-[#202c33]">
            <img src="avatar.png" class="w-10 h-10 rounded-full cursor-pointer">
            <div class="flex gap-6 text-[#54656f] dark:text-[#aebac1] text-xl">
                <ion-icon name="people-outline"></ion-icon>
                <ion-icon name="ellipse-outline"></ion-icon>
                <ion-icon name="chatbox-ellipses"></ion-icon>
                <ion-icon name="ellipsis-vertical"></ion-icon>
            </div>
        </header>
        
        <div class="p-2">
            <div class="bg-[#f0f2f5] dark:bg-[#202c33] flex items-center px-3 py-1.5 rounded-lg">
                <ion-icon name="search-outline" class="text-[#54656f] mr-4"></ion-icon>
                <input type="text" placeholder="Search or start new chat" class="bg-transparent w-full outline-none text-sm">
            </div>
        </div>

        <div id="contact-list" class="flex-1 overflow-y-auto">
            </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#efeae2] dark:bg-[#0b141a] relative">
        <div class="absolute inset-0 opacity-5 pointer-events-none bg-[url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')]"></div>
        
        <header class="h-[60px] px-4 flex items-center justify-between bg-[#f0f2f5] dark:bg-[#202c33] z-10 border-l border-[#d1d7db] dark:border-[#222d34]">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gray-300"></div>
                <div>
                    <h4 class="font-medium text-[#111b21] dark:text-[#e9edef]">Public Community</h4>
                    <p class="text-xs text-[#667781] dark:text-[#8696a0]">online</p>
                </div>
            </div>
        </header>

        <div id="messages" class="flex-1 overflow-y-auto p-6 flex flex-col gap-2 z-10">
            </div>

        <footer class="p-3 bg-[#f0f2f5] dark:bg-[#202c33] flex items-center gap-4 z-10">
            <ion-icon name="happy-outline" class="text-2xl text-[#54656f]"></ion-icon>
            <ion-icon name="add-outline" class="text-2xl text-[#54656f]"></ion-icon>
            <input id="chat-input" class="flex-1 bg-white dark:bg-[#2a3942] rounded-lg px-4 py-2 outline-none" placeholder="Type a message">
            <ion-icon name="mic-outline" class="text-2xl text-[#54656f]"></ion-icon>
        </footer>
    </main>
</div>
